<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Proxy URL Searcher</title>
</head>
<body>
  <h1>Proxy URL Searcher</h1>
  <div id="status">Loading...</div>

  <!-- Load UV bundle -->
  <script src="/uv/uv.bundle.js"></script>

  <!-- Initialize your app after page loads -->
  <script>
    window.onload = () => {
      document.getElementById('status').textContent = 'Initializing...';

      // Check if UV is loaded
      if (typeof UV !== 'undefined') {
        document.getElementById('status').textContent = 'UV loaded successfully';

        // Initialize UV or your searcher here
        // Example: UV.setup() or your custom code
        if (typeof UV.setup === 'function') {
          UV.setup(); // replace with actual initialization if needed
        }
      } else {
        document.getElementById('status').textContent = 'Failed to load UV';
        console.error('UV not loaded');
      }

      // Register service worker
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/service-worker.js')
          .then(reg => {
            console.log('Service Worker registered:', reg);
          })
          .catch(error => {
            console.error('Service Worker registration failed:', error);
          });
      }
    };
  </script>
</body>
</html>
