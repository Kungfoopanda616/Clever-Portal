<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>UV Proxy</title>
</head>
<body>
  <h1>UV Proxy</h1>
  <div id="status">Loading...</div>

  <!-- Load UV bundle -->
  <script src="/uv/uv.bundle.js"></script>

  <script>
    window.onload = () => {
      document.getElementById('status').textContent = 'Initializing...';

      // Check UV loaded
      if (typeof UV !== 'undefined') {
        document.getElementById('status').textContent = 'UV loaded!';
        // Initialize UV or your proxy logic here
        // For example, UV.setup() if needed
      } else {
        document.getElementById('status').textContent = 'Failed to load UV.';
        console.error('UV not loaded.');
      }

      // Register Service Worker
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/uv/uv.sw.js')
          .then(reg => {
            console.log('Service Worker registered:', reg);
          })
          .catch(err => {
            console.error('Service Worker registration failed:', err);
          });
      }
    };
  </script>
</body>
</html>
